<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatGPT Inspired Portfolio</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #000;
      color: white;
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 10px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: #19c37d;
      color: black;
    }
    .bot {
      align-self: flex-start;
      background: #222;
      color: white;
      border: 1px solid #333;
    }
    .typing {
      align-self: flex-start;
      background: #222;
      border: 1px solid #333;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      color: #888;
      font-style: italic;
    }

    /* Center options */
    .center-options {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .center-options h2 {
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: bold;
    }
    .option-btn {
      display: inline-block;
      margin: 8px;
      padding: 12px 20px;
      border-radius: 25px;
      border: 1px solid #333;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    .option-btn:hover {
      background: #222;
    }

    /* Footer input */
    .input-container {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #111;
      border-top: 1px solid #222;
    }
    select {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: #222;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .input-container button {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 50%;
      background: #19c37d;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- Chat area -->
  <div class="chat-container" id="chat-container">
    <div class="message bot">👋 Hi! I’m your portfolio assistant. Pick an option below!</div>
  </div>

  <!-- Center options -->
  <div class="center-options" id="center-options">
    <h2>What can I help with?</h2>
    <button class="option-btn" onclick="handleSelection('about')">About</button>
    <button class="option-btn" onclick="handleSelection('skills')">Skills</button>
    <button class="option-btn" onclick="handleSelection('projects')">Projects</button>
    <button class="option-btn" onclick="handleSelection('contact')">Contact</button>
  </div>

  <!-- Footer with dropdown -->
  <div class="input-container">
    <select id="optionSelect">
      <option value="" disabled selected>Choose an option...</option>
      <option value="about">About</option>
      <option value="skills">Skills</option>
      <option value="projects">Projects</option>
      <option value="contact">Contact</option>
    </select>
    <button onclick="handleDropdown()">➤</button>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const centerOptions = document.getElementById("center-options");

// > Muskan:
// Responses
    const responses = {
      about: "I am Muskan Agrawal, a passionate developer who loves building web applications and exploring new technologies.",
      skills: "I have strong skills in competitive programming, with a deep understanding of core computer science subjects like Data Structures, Algorithms, DBMS, OS, and CN. I am proficient in languages like C, C++, and have experience with web development technologies including HTML, CSS, JavaScript and database like MySQL and also have practical knowledge of Docker and Kubernetes for deployment.",
      projects: "I’ve worked on several projects including an eCommerce app, a portfolio website, and a full-stack clothing store.",
    };

    // Add message
    function addMessage(text, sender="bot", typingEffect=false) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      if (typingEffect) {
        let i = 0;
        const interval = setInterval(() => {
          msg.textContent += text[i];
          i++;
          chatContainer.scrollTop = chatContainer.scrollHeight;
          if (i >= text.length) clearInterval(interval);
        }, 30);
      } else {
        msg.textContent = text;
      }
    }

    // Show typing dots before real reply
    function botReplyWithTyping(text) {
      const typingMsg = document.createElement("div");
      typingMsg.classList.add("typing");
      typingMsg.textContent = "ChatGPT is typing...";
      chatContainer.appendChild(typingMsg);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      setTimeout(() => {
        typingMsg.remove();
        addMessage(text, "bot", true);
      }, 1200); // dots visible before typing starts
    }

    // Handle button selection
    function handleSelection(option) {
      centerOptions.style.display = "none"; // hide welcome buttons
      addMessage(option.charAt(0).toUpperCase() + option.slice(1), "user");

      if (option === "contact") {
        window.location.href = "mailto:yourname@example.com";
      } else {
        botReplyWithTyping(responses[option]);
      }
    }

    // Handle dropdown selection
    function handleDropdown() {
      const option = document.getElementById("optionSelect").value;
      if (!option) return;
      handleSelection(option);
    }
  </script>
</body>
</html>
